update_interval: 5
packageset_update_interval: 10
# Launchpad series statuses to monitor for packageset changes.
# Possible values: Active Development, Pre-release Freeze, Frozen,
#                  Current Stable Release, Supported, Experimental
# Reducing this list significantly reduces Launchpad API calls.
packageset_series_statuses:
  - Active Development
  - Pre-release Freeze
  - Frozen
  - Current Stable Release
# Also scan the latest active LTS release (e.g. noble/24.04) even when its
# status is "Supported" and not listed in packageset_series_statuses above.
packageset_include_latest_lts: true
whitelist:
- '@ravage:xentonix.net'
rooms:
    '#release:ubuntu.com':
        queue: [New, Unapproved]
        tracker: Builds
        packageset: Packageset
        mute: []
    '#lubuntu-devel:ubuntu.com':
        tracker: Builds
        tracker_filter: lubuntu
        queue: [New, Unapproved]
        queue_filter: lubuntu
        packageset: Packageset
        packageset_filter: lubuntu
        mute: []
    '#queuebot:xentonix.net':
        queue: [Unapproved]
        packageset: Packageset
        mute: []
